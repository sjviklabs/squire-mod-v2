license = "MIT"

[[mods]]
    modId = "squire"
    version = "${mod_version}"
    displayName = "Squire Mod"
    description = "A real companion — walks everywhere, never teleports."

[[dependencies.squire]]
    modId = "neoforge"
    type = "required"
    versionRange = "[21.1.221,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.squire]]
    modId = "minecraft"
    type = "required"
    versionRange = "[1.21.1,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.squire]]
    modId = "geckolib"
    type = "required"
    versionRange = "[4.8,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.squire]]
    modId = "jade"
    type = "optional"
    versionRange = "[15.0,)"
    ordering = "NONE"
    side = "CLIENT"

[[dependencies.squire]]
    modId = "curios"
    type = "optional"
    versionRange = "[9.5,)"
    ordering = "NONE"
    side = "BOTH"

# v4.0.0 — MineColonies is a HARD dependency. The squire's AI is built on MC's
# TickRateStateMachine and ThreatTable primitives. Without MC loaded, SquireEntity's
# AI controller cannot instantiate. Load-after ensures MC's registries are populated
# before we reference them.
[[dependencies.squire]]
    modId = "minecolonies"
    type = "required"
    versionRange = "[1.1.1299,)"
    ordering = "AFTER"
    side = "BOTH"
